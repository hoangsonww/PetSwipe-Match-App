apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petswipe

resources:
  - namespace.yaml
  - limitrange.yaml
  - resourcequota.yaml
  - priorityclass.yaml
  - default-deny-networkpolicy.yaml
  - serviceaccount.yaml
  - backend-configmap.yaml
  - backend-secret.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - backend-hpa.yaml
  - backend-pdb.yaml
  - backend-ingress-networkpolicy.yaml
  - backend-egress-networkpolicy.yaml
  - frontend-configmap.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - frontend-hpa.yaml
  - frontend-pdb.yaml
  - frontend-ingress-networkpolicy.yaml
  - frontend-egress-networkpolicy.yaml
  - ingress.yaml

images:
  - name: petswipe-backend
    newName: ghcr.io/your-org/petswipe-backend
    newTag: latest
  - name: petswipe-frontend
    newName: ghcr.io/your-org/petswipe-frontend
    newTag: latest

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: petswipe-platform
