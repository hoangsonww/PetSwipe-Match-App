apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: petswipe-frontend-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: petswipe-frontend
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5001

