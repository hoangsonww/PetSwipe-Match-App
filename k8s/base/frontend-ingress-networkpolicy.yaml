apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: petswipe-frontend-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: petswipe-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

